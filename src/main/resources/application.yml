spring:
  application:
    name: quant-system
  datasource:
    url: jdbc:mysql://localhost:3306/quant_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8080

logging:
  level:
    com.quant: DEBUG
    org.hibernate.SQL: DEBUG

# Data collection settings
quant:
  collect:
    retry-times: 3
    batch-size: 100
    enable-schedule: false